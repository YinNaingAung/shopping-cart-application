
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>shopping cart</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="whole-container">
            <h1><img class="shopify" src="./shopcart/shopify-brands-solid.svg" alt="">My shop</h1>
            <hr>
            <div class="twoparts">
                <div class="partone">
                </div>
                
                <div class="parttwo">
                    <div>
                        <div class="cartListhead">
                            <h2>Cart List </h2>
                            <div class="shopcartcontainer">
                                <img class="shopcart" src="./shopcart/cart-shopping-solid.svg" alt="">
                                <span>0</span>
                            </div>
                        </div>
                        <hr>
                        <table>
                            <thead>
                                <tr>
                                    <th>Image</th>
                                    <th>Price</th>
                                    <th>Quantity</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody class="showchosencart">
                                
                            </tbody>
                        </table>
                        <div class="noitem"><p>no data in here</p></div>
                        <div class="total-price">
                            <h3>Total Price </h3>
                            <span>$0.00</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
    <script src="./api.js"></script>
    <!-- <script src="./app.js"></script> -->
     <script src="./main.js"></script>
</html>
